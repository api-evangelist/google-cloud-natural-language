aid: google-cloud-natural-language
name: Google Cloud Natural Language
description: >-
  Google Cloud Natural Language API provides natural language understanding
  technologies including sentiment analysis, entity recognition, entity
  sentiment analysis, content classification, and syntax analysis. It helps
  developers extract insights from unstructured text.
